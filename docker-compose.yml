version: '3.8'

services:
  kafka:
    image: confluentinc/cp-kafka:7.8.3
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092" ]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  state_aggregator:
    build: 
      context: ./data_pipeline
      dockerfile: ./state_aggregator/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started

  recon_brain:
    build: 
      context: ./data_pipeline
      dockerfile: ./recon_brain/Dockerfile
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started

  attack_brain:
    build: 
      context: ./data_pipeline
      dockerfile: ./attack_brain/Dockerfile
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started

  drone_sim:
    build: 
      context: ./data_pipeline
      dockerfile: ./edge_simulators/Dockerfile
    command: python drones/drones_sim.py --kafka-bootstrap kafka:29092 --num-drones 20
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  target_sim:
    build: 
      context: ./data_pipeline
      dockerfile: ./edge_simulators/Dockerfile
    command: python targets/target_sim.py --kafka-bootstrap kafka:29092
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  attack_commander:
    build: 
      context: ./data_pipeline
      dockerfile: ./attack_commander/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started

  log_aggregator:
    build: 
      context: ./data_pipeline
      dockerfile: ./log_aggregator/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  history_service:
    build: 
      context: ./data_pipeline
      dockerfile: ./history_writer/Dockerfile
    ports:
      - "8002:8000"
    depends_on:
      mongo:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC=aggregated-state-topic
      - KAFKA_GROUP_ID=history-archive-group

  node_backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      - COMMANDER_URL=http://attack_commander:8000
      - AGGREGATOR_URL=http://state_aggregator:8000
      - HISTORY_URL=http://history_service:8000
    depends_on:
      - attack_commander
      - state_aggregator
      - history_service

  react_client:
    build:
      context: ./client
      args:
        - VITE_API_URL=http://localhost:3001
    ports:
      - "5173:8080"
    depends_on:
      - node_backend
